name: Deploy to WordPress.org
on:
  release:
    types:
      - created
      - edited

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  tag:
    name: New tag
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # Required to check out the repository. The plugin deploy action publishes to WordPress.org SVN using SVN_USERNAME/SVN_PASSWORD secrets (no GitHub API usage).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build
        run: composer install --no-progress --no-dev --optimize-autoloader
      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # v2.3.0
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
