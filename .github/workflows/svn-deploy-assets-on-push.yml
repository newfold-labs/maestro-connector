name: Plugin Asset/Readme Update
on:
  push:
    branches:
      - master
    paths:
      - .wordpress-org/*
      - readme.txt

# Disable permissions for all available scopes by default.
# Any needed permissions should be configured at the job level.
permissions: {}

jobs:
  master:
    name: Push to master
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # Required to check out the repository. The asset updater pushes to WordPress.org SVN using SVN_USERNAME/SVN_PASSWORD secrets (no GitHub API usage).
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: WordPress.org plugin asset/readme update
        uses: bluehost/wp-plugin-readme-assets-updater@master
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
